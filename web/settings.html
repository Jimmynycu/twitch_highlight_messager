<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Highlight Radar — Brain &amp; AI</title>
<style>
  :root{--frame:#0E0C14;--base:#13111A;--surface:#1C1926;--surface-2:#242031;--hair:#2E2A3D;
    --text:#ECE9F2;--text-2:#9C95AE;--text-3:#6B6580;--accent:#A970FF;--accent-ink:#160D28;--good:#5BD6A0;
    --sans:"Segoe UI Variable Text","Segoe UI",system-ui,-apple-system,sans-serif;--mono:ui-monospace,"Cascadia Code","Consolas",monospace;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--base);color:var(--text);font-family:var(--sans);letter-spacing:-.01em;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto;padding:26px 18px 48px}
  header{display:flex;align-items:center;gap:.6rem;margin-bottom:1.5rem}
  header .logo{color:var(--accent)} .name{font-weight:680;font-size:1.05rem;letter-spacing:-.02em}
  .back{margin-left:auto;font-size:.82rem;color:var(--text-2);text-decoration:none;border:1px solid var(--hair);padding:.35rem .65rem;border-radius:9px;transition:.12s}
  .back:hover{color:var(--text);border-color:var(--accent)}
  h2{font-size:11.5px;font-family:var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--text-3);margin:1.7rem 0 .5rem}
  .help{color:var(--text-2);font-size:.85rem;margin:0 0 .7rem}
  .goal{width:100%;min-height:96px;background:var(--surface);border:1px solid var(--hair);border-radius:11px;color:var(--text);font-family:var(--sans);font-size:.95rem;line-height:1.5;padding:.75rem .9rem;resize:vertical;transition:opacity .15s}
  .goal:focus{outline:none;border-color:var(--accent)} .goal:disabled{opacity:.45;cursor:not-allowed}
  .actions{display:flex;align-items:center;gap:.7rem;margin-top:.7rem;flex-wrap:wrap}
  .btn{border:none;background:var(--accent);color:var(--accent-ink);font-family:var(--sans);font-weight:650;font-size:.92rem;padding:.6rem 1.05rem;border-radius:9px;cursor:pointer;transition:transform .12s,filter .12s}
  .btn:hover{filter:brightness(1.07)} .btn:active{transform:scale(.97)} .btn:disabled{opacity:.5;cursor:not-allowed}
  .out{font-size:.84rem;color:var(--text-2)}
  .brain{display:flex;align-items:center;gap:.7rem;background:var(--surface);border:1px solid var(--hair);border-radius:11px;padding:.7rem .85rem;margin-bottom:.5rem;cursor:pointer;transition:.12s}
  .brain:hover{border-color:var(--accent)}
  .brain.active{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
  .brain .bn{font-weight:650;font-size:.95rem} .brain .bt{font-size:.82rem;color:var(--text-2);margin-top:.1rem}
  .brain .badge{margin-left:auto;font-family:var(--mono);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;padding:.22rem .55rem;border-radius:999px;white-space:nowrap}
  .badge.active{color:var(--accent-ink);background:var(--accent)} .badge.use{color:var(--text-3);border:1px solid var(--hair)}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <svg class="logo" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="6" cy="18" r="1.9" fill="currentColor" stroke="none"/><path d="M6 13.6 A4.4 4.4 0 0 1 10.4 18"/><path d="M6 9.1 A8.9 8.9 0 0 1 14.9 18"/><path d="M6 4.6 A13.4 13.4 0 0 1 19.4 18"/></svg>
    <div class="name">Brain &amp; AI</div>
    <a class="back" href="/">&larr; Panel</a>
  </header>

  <h2>Your gems</h2>
  <p class="help" id="gemhelp">Describe the moments you care about — plain English.</p>
  <textarea id="goal" class="goal" placeholder="funny copypasta &amp; inside jokes, big-play hype, genuine questions aimed at me, first-timers — skip generic 'hi' and bot spam"></textarea>
  <div class="actions">
    <button class="btn" id="savegems">Save &amp; use my gems</button>
    <button class="btn" id="connect" style="display:none">Connect ChatGPT</button>
    <span class="out" id="gemout"></span>
  </div>

  <h2>Or pick a brain</h2>
  <div id="brains"></div>
</div>
<script>
(function(){
  var J={"Content-Type":"application/json"};
  var brainsEl=document.getElementById("brains"), connectBtn=document.getElementById("connect"),
      saveBtn=document.getElementById("savegems"), goal=document.getElementById("goal"),
      gemout=document.getElementById("gemout"), gemhelp=document.getElementById("gemhelp");

  function renderBrains(list){
    brainsEl.innerHTML="";
    list.forEach(function(b){
      var el=document.createElement("div");
      el.className="brain"+(b.active?" active":"");
      el.innerHTML='<div><div class="bn"></div><div class="bt"></div></div><span class="badge '+(b.active?"active":"use")+'">'+(b.active?"Active":"Use")+'</span>';
      el.querySelector(".bn").textContent=b.label||b.name;
      el.querySelector(".bt").textContent=b.tagline||"";
      if(!b.active) el.onclick=function(){
        fetch("/brain",{method:"POST",headers:J,body:JSON.stringify({name:b.name})}).then(function(r){return r.json();}).then(function(res){ if(res.ok) load(); });
      };
      brainsEl.appendChild(el);
    });
  }
  // single accent CTA + dependency order: not connected -> Connect (gems locked); connected -> Save
  function renderAI(connected){
    connectBtn.style.display = connected ? "none" : "";
    saveBtn.style.display = connected ? "" : "none";
    goal.disabled = !connected;
    gemhelp.textContent = connected
      ? "Describe the moments you care about — plain English."
      : "Connect ChatGPT first, then describe the moments you care about.";
  }
  function load(){
    fetch("/brains").then(function(r){return r.json();}).then(renderBrains).catch(function(e){brainsEl.textContent="Could not load: "+e;});
    fetch("/health").then(function(r){return r.json();}).then(function(h){ renderAI(!!h.openai); }).catch(function(){});
    fetch("/gems").then(function(r){return r.json();}).then(function(g){ if(g.goal && !goal.value) goal.value=g.goal; }).catch(function(){});
  }
  saveBtn.onclick=function(){
    var g=goal.value.trim(); gemout.textContent="Saving…";
    fetch("/gems",{method:"POST",headers:J,body:JSON.stringify({goal:g})}).then(function(r){return r.json();}).then(function(r){
      if(r.active==="custom"){ gemout.textContent="On — highlighting your gems ✓"; load(); }
      else if(r.ok){ gemout.textContent=r.note||"Saved."; load(); }
      else { gemout.textContent="Type what to highlight first."; }
    }).catch(function(e){ gemout.textContent="Error: "+e; });
  };
  connectBtn.onclick=function(){
    connectBtn.disabled=true; gemout.textContent="Opening ChatGPT login…";
    fetch("/auth/openai",{method:"POST"}).then(function(r){return r.json();}).then(function(r){
      if(r.status==="ok"){ gemout.textContent="Connected ✓ — now describe your gems"; load(); goal.focus(); }
      else { gemout.textContent="Could not connect: "+(r.error||"unavailable"); connectBtn.disabled=false; }
    }).catch(function(e){ gemout.textContent="Error: "+e; connectBtn.disabled=false; });
  };
  load();
})();
</script>
</body>
</html>
