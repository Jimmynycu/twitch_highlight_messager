<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Highlight Radar — Brain &amp; AI</title>
<style>
  :root{--bg:#13111A;--frame:#0E0C14;--surface:#1C1926;--surface-2:#242031;--hair:#2E2A3D;
    --text:#ECE9F2;--text-2:#9C95AE;--text-3:#6B6580;--accent:#A970FF;--good:#5BD6A0;
    --sans:"Segoe UI Variable Text","Segoe UI",system-ui,sans-serif;--mono:ui-monospace,"Cascadia Code","Consolas",monospace;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--frame);color:var(--text);font-family:var(--sans);line-height:1.5;min-height:100vh}
  .wrap{max-width:560px;margin:0 auto;padding:1.6rem 1.1rem 3rem}
  header{display:flex;align-items:center;gap:.6rem;margin-bottom:1.4rem}
  header .logo{color:var(--accent)} .name{font-weight:650;font-size:1.05rem}
  .back{margin-left:auto;font-size:.82rem;color:var(--text-2);text-decoration:none;border:1px solid var(--hair);padding:.35rem .65rem;border-radius:8px}
  .back:hover{color:var(--text);border-color:var(--accent)}
  h2{font-size:.74rem;font-family:var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--text-3);margin:1.6rem 0 .7rem}
  .goal{width:100%;min-height:96px;background:var(--surface);border:1px solid var(--hair);border-radius:11px;color:var(--text);font-family:var(--sans);font-size:.95rem;line-height:1.5;padding:.75rem .9rem;resize:vertical}
  .goal:focus{outline:none;border-color:var(--accent)}
  .actions{display:flex;align-items:center;gap:.7rem;margin-top:.7rem;flex-wrap:wrap}
  .btn{border:none;background:var(--accent);color:#160d28;font-family:var(--sans);font-weight:650;font-size:.92rem;padding:.6rem 1rem;border-radius:9px;cursor:pointer}
  .btn.ghost{background:transparent;border:1px solid var(--hair);color:var(--text-2)}
  .btn.ghost:hover{border-color:var(--accent);color:var(--text)} .btn:disabled{opacity:.5;cursor:not-allowed}
  .out{font-size:.84rem;color:var(--text-2)}
  .brain{display:flex;align-items:center;gap:.7rem;background:var(--surface);border:1px solid var(--hair);border-radius:11px;padding:.7rem .85rem;margin-bottom:.5rem;cursor:pointer;transition:.12s}
  .brain:hover{border-color:var(--accent)}
  .brain.active{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
  .brain.locked{opacity:.55;cursor:not-allowed}
  .brain .bn{font-weight:600;font-size:.95rem} .brain .bt{font-size:.82rem;color:var(--text-2);margin-top:.1rem}
  .brain .badge{margin-left:auto;font-family:var(--mono);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;padding:.22rem .5rem;border-radius:999px;white-space:nowrap}
  .badge.active{color:#160d28;background:var(--accent)} .badge.locked{color:var(--text-3);border:1px solid var(--hair)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <svg class="logo" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="6" cy="18" r="1.9" fill="currentColor" stroke="none"/><path d="M6 13.6 A4.4 4.4 0 0 1 10.4 18"/><path d="M6 9.1 A8.9 8.9 0 0 1 14.9 18"/><path d="M6 4.6 A13.4 13.4 0 0 1 19.4 18"/></svg>
    <div class="name">Brain &amp; AI</div>
    <a class="back" href="/">&larr; Panel</a>
  </header>

  <h2>Your gems</h2>
  <textarea id="goal" class="goal" placeholder="Highlight: funny copypasta &amp; inside jokes, big-play hype, genuine questions aimed at me, first-timers — skip generic 'hi' and bot spam"></textarea>
  <div class="actions">
    <button class="btn" id="savegems">Save &amp; use my gems</button>
    <button class="btn ghost" id="connect" style="display:none">Connect ChatGPT to use gems</button>
    <span class="out" id="gemout"></span>
  </div>

  <h2>Or pick a brain</h2>
  <div id="brains"></div>
</div>
<script>
(function(){
  var J={"Content-Type":"application/json"};
  var brainsEl=document.getElementById("brains"), connectBtn=document.getElementById("connect"),
      goal=document.getElementById("goal"), gemout=document.getElementById("gemout");
  var connected=false;

  function renderBrains(list){
    brainsEl.innerHTML="";
    list.forEach(function(b){
      var locked=!b.available;
      var el=document.createElement("div");
      el.className="brain"+(b.active?" active":"")+(locked?" locked":"");
      el.innerHTML='<div><div class="bn"></div><div class="bt"></div></div>'+
        '<span class="badge '+(b.active?"active":"locked")+'">'+(b.active?"Active":(locked?"needs ChatGPT":"Use"))+'</span>';
      el.querySelector(".bn").textContent=b.label||b.name;
      el.querySelector(".bt").textContent=b.tagline||"";
      if(!locked && !b.active) el.onclick=function(){
        fetch("/brain",{method:"POST",headers:J,body:JSON.stringify({name:b.name})}).then(function(r){return r.json();}).then(function(res){ if(res.ok) load(); });
      };
      brainsEl.appendChild(el);
    });
  }
  function load(){
    fetch("/brains").then(function(r){return r.json();}).then(renderBrains).catch(function(e){brainsEl.textContent="Could not load: "+e;});
    fetch("/health").then(function(r){return r.json();}).then(function(h){ connected=!!h.openai; connectBtn.style.display=connected?"none":""; }).catch(function(){});
    fetch("/gems").then(function(r){return r.json();}).then(function(g){ if(g.goal && !goal.value) goal.value=g.goal; }).catch(function(){});
  }
  document.getElementById("savegems").onclick=function(){
    var g=goal.value.trim(); gemout.textContent="Saving…";
    fetch("/gems",{method:"POST",headers:J,body:JSON.stringify({goal:g})}).then(function(r){return r.json();}).then(function(r){
      if(r.active==="custom"){ gemout.textContent="On — highlighting your gems ✓"; load(); }
      else if(r.ok){ gemout.textContent=r.note||"Saved."; load(); }
      else { gemout.textContent="Type what to highlight first."; }
    }).catch(function(e){ gemout.textContent="Error: "+e; });
  };
  connectBtn.onclick=function(){
    connectBtn.disabled=true; gemout.textContent="Opening ChatGPT login…";
    fetch("/auth/openai",{method:"POST"}).then(function(r){return r.json();}).then(function(r){
      if(r.status==="ok"){ gemout.textContent="Connected ✓ — save your gems above"; load(); goal.focus(); }
      else { gemout.textContent="Could not connect: "+(r.error||"unavailable"); connectBtn.disabled=false; }
    }).catch(function(e){ gemout.textContent="Error: "+e; connectBtn.disabled=false; });
  };
  load();
})();
</script>
</body>
</html>
