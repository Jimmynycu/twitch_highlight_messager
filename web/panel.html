<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Highlight Radar</title>
<style>
  :root{
    --frame:#0E0C14; --base:#13111A; --surface:#1C1926; --surface-2:#242031; --hair:#2E2A3D;
    --glass:rgba(19,17,26,.78);
    --text:#ECE9F2; --text-2:#9C95AE; --text-3:#6B6580;
    --accent:#A970FF; --accent-ink:#160D28; --live:#5BD6A0; --error:#FF7070;
    --sans:"Segoe UI Variable Text","Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    --mono:ui-monospace,"Cascadia Code","Cascadia Mono","Consolas",Menlo,monospace;
  }
  *{box-sizing:border-box} html,body{height:100%}
  body{margin:0;background:var(--frame);color:var(--text);font-family:var(--sans);letter-spacing:-.01em;-webkit-font-smoothing:antialiased;}
  .app{max-width:600px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:var(--base);border-inline:1px solid var(--hair);overflow:hidden;}
  .scroll{flex:1;min-height:0;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--hair) transparent;}
  .scroll::-webkit-scrollbar{width:8px} .scroll::-webkit-scrollbar-thumb{background:var(--hair);border-radius:8px}

  /* ---- glass header (feed scrolls beneath) ---- */
  .bar{position:sticky;top:0;z-index:6;display:flex;align-items:center;gap:.85rem;padding:13px 16px;
    background:var(--glass);backdrop-filter:saturate(160%) blur(18px);-webkit-backdrop-filter:saturate(160%) blur(18px);
    border-bottom:1px solid var(--hair);}
  .brand{display:flex;align-items:center;gap:.55rem}
  .brand .logo{color:var(--accent);flex-shrink:0}
  .brand .name{font-weight:650;font-size:.98rem;letter-spacing:-.02em;line-height:1.05;display:block}
  .brand .sub{font-family:var(--mono);font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-3);display:block;margin-top:.12rem}
  .meta{margin-left:auto;display:flex;align-items:center;gap:.7rem}
  .stat{display:flex;flex-direction:column;align-items:flex-end;line-height:1}
  .stat .k{font-family:var(--mono);font-size:.56rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-3);margin-bottom:.25rem}
  .stat .v{font-family:var(--mono);font-size:.92rem;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text)}
  .chan{display:flex;align-items:center;gap:.4rem;font-size:.76rem;color:var(--text-2);border:1px solid var(--hair);padding:.3rem .55rem;border-radius:999px}
  .livedot{width:7px;height:7px;border-radius:50%;background:var(--text-3)}
  .live .livedot{background:var(--live);box-shadow:0 0 0 0 rgba(91,214,160,.6);animation:pulse 2.2s infinite}
  .ctl{background:transparent;border:1px solid transparent;color:var(--text-3);width:30px;height:30px;border-radius:8px;display:grid;place-items:center;cursor:pointer;transition:color .12s,border-color .12s,transform .12s;text-decoration:none}
  .ctl:hover{color:var(--text);border-color:var(--accent)} .ctl:active{transform:scale(.94)}
  .brainsel{background:transparent;border:1px solid transparent;color:var(--text-2);font-family:var(--mono);font-size:.68rem;border-radius:8px;padding:.32rem .35rem;max-width:135px;cursor:pointer;transition:.12s}
  .brainsel:hover{color:var(--text);border-color:var(--accent)} .brainsel:focus{outline:none;border-color:var(--accent)}

  /* ---- disconnect banner ---- */
  .banner{position:sticky;top:0;z-index:9;display:none;align-items:center;gap:.5rem;padding:.5rem 1rem;
    background:rgba(255,112,112,.12);border-bottom:1px solid rgba(255,112,112,.35);color:var(--error);font-size:.82rem}
  .banner.show{display:flex}

  /* ---- filter chips ---- */
  .filters{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;padding:10px 16px;border-bottom:1px solid var(--hair)}
  .flabel{font-family:var(--mono);font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-3);margin-right:.2rem}
  .fchip{display:inline-flex;align-items:center;gap:.4rem;font-family:var(--mono);font-size:.66rem;color:var(--text-2);background:transparent;border:1px solid var(--hair);padding:.3rem .55rem;border-radius:999px;cursor:pointer;transition:.12s}
  .fchip .fdot{width:7px;height:7px;border-radius:50%;background:var(--cat)}
  .fchip:hover{color:var(--text);border-color:var(--cat)} .fchip:active{transform:scale(.97)}
  .fchip.on{background:var(--surface-2);border-color:var(--cat);color:var(--text)}
  .fchip.off{opacity:.4} .fchip.off .fdot{background:var(--text-3)}
  .fchip.q{--cat:#7AA2FF} .fchip.hype{--cat:#FFB454} .fchip.fun{--cat:#FF7BC2} .fchip.nw{--cat:#5BD6A0}

  /* ---- feed + gem cards ---- */
  .feed{padding:11px;display:flex;flex-direction:column;gap:8px;min-height:calc(100vh - 220px)}
  .empty{margin:auto;text-align:center;color:var(--text-3);padding:2rem 1rem}
  .empty .ring{color:var(--accent);opacity:.7;margin-bottom:.8rem}
  .empty .et{font-size:.9rem;color:var(--text-2)} .empty .es{font-size:.8rem;margin-top:.35rem}

  .gem{position:relative;flex-shrink:0;background:var(--surface);border:1px solid var(--hair);border-radius:11px;
    padding:12px 14px 13px 17px;overflow:hidden;transition:background .15s,opacity .22s}
  .gem:hover{background:var(--surface-2)}
  .gem .stripe{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cat);opacity:.5}
  .gem.fresh{animation:slidein .22s cubic-bezier(.2,.7,.3,1)}
  .gem.priority{background:var(--surface-2)} .gem.priority .stripe{opacity:1}
  .gem.priority.fresh{animation:slidein .22s cubic-bezier(.2,.7,.3,1),pop .24s ease-out;box-shadow:inset 0 0 0 1px var(--cat),0 0 22px -8px var(--cat)}
  .gem.kept{box-shadow:inset 0 0 0 1px var(--cat)} .gem.kept .stripe{opacity:1}
  /* age gradient: newest loud, older recede (articles only, so empty-state div is ignored) */
  .feed article:nth-of-type(2){opacity:.93} .feed article:nth-of-type(3){opacity:.86}
  .feed article:nth-of-type(4){opacity:.79} .feed article:nth-of-type(5){opacity:.72}
  .feed article:nth-of-type(n+6){opacity:.64}
  .gem.kept{opacity:1!important}

  .gem.q{--cat:#7AA2FF} .gem.hype{--cat:#FFB454} .gem.fun{--cat:#FF7BC2} .gem.nw{--cat:#5BD6A0}
  .gem.mention{--cat:#C77DFF} .gem.sub{--cat:#FF6B6B}
  .head{display:flex;align-items:center;gap:.5rem;margin-bottom:5px}
  .chip{display:inline-flex;align-items:center;gap:.35rem;font-family:var(--mono);font-size:.59rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--cat)}
  .chip .dot{width:6px;height:6px;border-radius:50%;background:var(--cat)}
  .user{font-size:.81rem;font-weight:650;color:var(--uc,var(--text-2))}
  .time{font-family:var(--mono);font-size:.66rem;color:var(--text-3);font-variant-numeric:tabular-nums}
  .acts{margin-left:auto;display:flex;gap:.15rem;opacity:0;transition:opacity .12s}
  .gem:hover .acts,.gem:focus-within .acts,.gem.kept .acts{opacity:1}
  .act{background:transparent;border:none;color:var(--text-3);width:26px;height:26px;border-radius:7px;display:grid;place-items:center;cursor:pointer}
  .act:hover{background:var(--surface);color:var(--text)} .act.keep.on{color:var(--cat)}
  .msg{margin:0;font-size:17px;font-weight:450;line-height:1.45;color:var(--text);word-break:break-word}

  .foot{display:flex;align-items:center;gap:.45rem;padding:.55rem 1rem;border-top:1px solid var(--hair);font-family:var(--mono);font-size:.62rem;letter-spacing:.04em;color:var(--text-3);background:var(--frame)}
  .foot .d{width:6px;height:6px;border-radius:50%;background:var(--text-3)} .foot.live .d{background:var(--live)}

  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(91,214,160,.55)}70%{box-shadow:0 0 0 7px rgba(91,214,160,0)}100%{box-shadow:0 0 0 0 rgba(91,214,160,0)}}
  @keyframes slidein{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.02)}100%{transform:scale(1)}}
  @media (prefers-reduced-motion:reduce){.gem.fresh,.gem.priority.fresh{animation:none}.live .livedot{animation:none}}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="scroll">
    <div class="banner" id="banner">Disconnected — reconnecting to the radar…</div>
    <header class="bar">
      <div class="brand">
        <svg class="logo" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="6" cy="18" r="1.9" fill="currentColor" stroke="none"/><path d="M6 13.6 A4.4 4.4 0 0 1 10.4 18"/><path d="M6 9.1 A8.9 8.9 0 0 1 14.9 18"/><path d="M6 4.6 A13.4 13.4 0 0 1 19.4 18"/></svg>
        <div><span class="name">Highlight Radar</span><span class="sub" id="brain">brain: …</span></div>
      </div>
      <div class="meta">
        <div class="stat"><span class="k">gems</span><span class="v" id="count">0</span></div>
        <select class="brainsel" id="brainsel" title="Switch brain — applies live"></select>
        <div class="chan" id="status"><span class="livedot"></span><span id="statustxt">connecting…</span></div>
        <button class="ctl" id="pause" aria-label="Pause feed" title="Pause feed"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg></button>
        <button class="ctl" id="logout" aria-label="Change channel" title="Change channel"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></button>
        <a class="ctl" href="/settings" aria-label="Brain &amp; AI settings" title="Brain &amp; AI settings"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 6h8M16 6h4M4 12h4M12 12h8M4 18h8M16 18h4"/><circle cx="14" cy="6" r="2"/><circle cx="10" cy="12" r="2"/><circle cx="14" cy="18" r="2"/></svg></a>
      </div>
    </header>
    <div class="filters">
      <span class="flabel">show</span>
      <button class="fchip q on" data-cat="q" aria-pressed="true"><span class="fdot"></span>Questions</button>
      <button class="fchip hype on" data-cat="hype" aria-pressed="true"><span class="fdot"></span>Hype</button>
      <button class="fchip fun on" data-cat="fun" aria-pressed="true"><span class="fdot"></span>Funny</button>
      <button class="fchip nw on" data-cat="nw" aria-pressed="true"><span class="fdot"></span>New chatters</button>
    </div>
    <main class="feed" id="feed" aria-live="polite">
      <div class="empty" id="empty">
        <svg class="ring" viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="6" cy="18" r="1.9" fill="currentColor" stroke="none"/><path d="M6 13.6 A4.4 4.4 0 0 1 10.4 18"/><path d="M6 9.1 A8.9 8.9 0 0 1 14.9 18"/><path d="M6 4.6 A13.4 13.4 0 0 1 19.4 18"/></svg>
        <div class="et" id="emptytxt">Listening for the good stuff…</div>
        <div class="es">The best chat appears here, newest on top.</div>
      </div>
    </main>
  </div>
  <footer class="foot" id="foot"><span class="d"></span><span id="foottxt">offline</span></footer>
</div>
<script>
(function(){
  var CAT={q:"Question",hype:"Hype",fun:"Funny",nw:"New chatter",mention:"Mention",sub:"Sub"};
  var PRIORITY={mention:1,sub:1};        // react-now tier: brighter + glow + pulse
  var MAX=40,feed=document.getElementById("feed"),countEl=document.getElementById("count"),empty=document.getElementById("empty");
  var count=0,active={q:1,hype:1,fun:1,nw:1,mention:1,sub:1},paused=false,buffer=[];

  function rel(ts){var d=Date.now()/1000-ts;if(d<3)return"now";if(d<60)return(d|0)+"s";return((d/60)|0)+"m";}
  function card(ev){
    var cat=CAT[ev.cat]?ev.cat:"q", pri=!!PRIORITY[cat];
    var el=document.createElement("article");
    el.className="gem "+cat+(pri?" priority":"")+" fresh";el.dataset.cat=cat;el.dataset.t=ev.ts;
    if(!active[cat])el.hidden=true;
    el.innerHTML='<span class="stripe"></span><div class="head"><span class="chip"><span class="dot"></span><span class="rlbl"></span></span><span class="user"></span><span class="time">'+rel(ev.ts)+'</span><span class="acts"><button class="act keep" aria-label="Keep" title="Keep"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M12 3l2.6 5.5 6 .8-4.4 4 1.1 6L12 16.6 6.1 19.3l1.1-6-4.4-4 6-.8z"/></svg></button><button class="act dismiss" aria-label="Dismiss" title="Dismiss"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 5l14 14M19 5L5 19"/></svg></button></span></div><p class="msg"></p>';
    el.querySelector(".rlbl").textContent=ev.reason||CAT[cat];
    var u=el.querySelector(".user");u.textContent=ev.user;u.style.setProperty("--uc",ev.color||"");
    el.querySelector(".msg").textContent=ev.text;
    el.querySelector(".dismiss").onclick=function(){el.remove();};
    el.querySelector(".keep").onclick=function(){el.classList.toggle("kept");this.classList.toggle("on",el.classList.contains("kept"));};
    return el;
  }
  function render(ev){
    if(empty){empty.remove();empty=null;}
    var el=card(ev);feed.insertBefore(el,feed.firstChild);
    setTimeout(function(){el.classList.remove("fresh");},1500);
    var nodes=feed.querySelectorAll(".gem");
    if(nodes.length>MAX)for(var i=nodes.length-1;i>=0;i--){if(!nodes[i].classList.contains("kept")){nodes[i].remove();break;}}
    count++;countEl.textContent=count;
  }
  function onEvent(ev){ if(paused){buffer.push(ev);} else {render(ev);} }

  document.querySelector(".filters").addEventListener("click",function(e){
    var b=e.target.closest(".fchip");if(!b)return;var c=b.dataset.cat;active[c]=!active[c];
    b.classList.toggle("on",!!active[c]);b.classList.toggle("off",!active[c]);b.setAttribute("aria-pressed",active[c]?"true":"false");
    feed.querySelectorAll('.gem[data-cat="'+c+'"]').forEach(function(g){g.hidden=!active[c];});
  });
  var pb=document.getElementById("pause");
  pb.onclick=function(){
    paused=!paused;
    pb.innerHTML=paused?'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M8 5l11 7-11 7z"/></svg>':'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>';
    pb.setAttribute("aria-label",paused?"Resume feed":"Pause feed");
    if(!paused){while(buffer.length)render(buffer.shift());}
  };
  setInterval(function(){feed.querySelectorAll(".gem").forEach(function(g){g.querySelector(".time").textContent=rel(+g.dataset.t);});},5000);

  var sel=document.getElementById("brainsel"),brainLbl=document.getElementById("brain");
  function loadBrains(){
    fetch("/brains").then(function(r){return r.json();}).then(function(list){
      sel.innerHTML="";
      list.forEach(function(b){
        var o=document.createElement("option");o.value=b.name;o.textContent=b.label||b.name;o.title=b.tagline||"";
        if(b.active){o.selected=true;brainLbl.textContent="brain: "+(b.label||b.name);}
        sel.appendChild(o);
      });
    }).catch(function(){});
  }
  sel.onchange=function(){
    fetch("/brain",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:sel.value})})
      .then(function(r){return r.json();}).then(function(res){ if(res&&res.ok){brainLbl.textContent="brain: "+sel.options[sel.selectedIndex].textContent;} }).catch(function(){});
  };
  loadBrains();

  var lo=document.getElementById("logout");
  lo.onclick=function(){
    var ch=prompt("Watch which channel?"); if(!ch) return;
    fetch("/channel",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({channel:ch})}).then(function(r){return r.json();}).then(function(r){ if(r.ok) location.reload(); else alert(r.error||"Invalid channel."); }).catch(function(){});
  };

  fetch("/health").then(function(r){return r.json();}).then(function(h){
    if(h.channel){var et=document.getElementById("emptytxt"); if(et) et.textContent="Listening to #"+h.channel+"…";}
  }).catch(function(){});

  function setStatus(live,txt){
    document.getElementById("status").classList.toggle("live",live);
    document.getElementById("foot").classList.toggle("live",live);
    document.getElementById("statustxt").textContent=txt;
    document.getElementById("foottxt").textContent=live?"live via SSE · localhost":"reconnecting…";
    document.getElementById("banner").classList.toggle("show",!live);
  }
  var es=new EventSource("/events");
  es.onopen=function(){setStatus(true,"live");};
  es.onerror=function(){setStatus(false,"reconnecting…");};
  es.onmessage=function(e){try{onEvent(JSON.parse(e.data));}catch(_){}};
})();
</script>
</body>
</html>
