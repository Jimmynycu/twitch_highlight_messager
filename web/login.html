<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Highlight Radar</title>
<style>
  :root{--bg:#13111A;--frame:#0E0C14;--surface:#1C1926;--hair:#2E2A3D;--text:#ECE9F2;
    --text-2:#9C95AE;--text-3:#6B6580;--accent:#A970FF;
    --sans:"Segoe UI Variable Text","Segoe UI",system-ui,sans-serif;--mono:ui-monospace,"Cascadia Code","Consolas",monospace;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--frame);color:var(--text);font-family:var(--sans);display:flex;align-items:center;justify-content:center}
  .box{width:100%;max-width:380px;padding:1.5rem;text-align:center}
  .logo{color:var(--accent)}
  h1{font-size:1.4rem;font-weight:680;margin:.6rem 0 .2rem;letter-spacing:-.02em}
  p{color:var(--text-2);font-size:.9rem;margin:0 0 1.3rem}
  .row{display:flex}
  .at{display:flex;align-items:center;padding:0 .15rem 0 .7rem;background:var(--frame);border:1px solid var(--hair);border-right:none;border-radius:10px 0 0 10px;color:var(--text-3);font-family:var(--mono)}
  input{flex:1;min-width:0;background:var(--frame);border:1px solid var(--hair);border-inline:none;color:var(--text);font-family:var(--mono);font-size:1rem;padding:.7rem .4rem}
  input:focus{outline:none}
  .row:focus-within .at,.row:focus-within input,.row:focus-within button{border-color:var(--accent)}
  button{border:1px solid var(--hair);border-left:none;background:var(--accent);color:#160d28;font-family:var(--sans);font-weight:650;font-size:.95rem;padding:.7rem 1.1rem;border-radius:0 10px 10px 0;cursor:pointer}
  .err{color:#FF7070;font-size:.82rem;margin-top:.7rem;min-height:1.1em}
  .hint{color:var(--text-3);font-size:.78rem;margin-top:.5rem}
</style>
</head>
<body>
<div class="box">
  <svg class="logo" viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="6" cy="18" r="1.9" fill="currentColor" stroke="none"/><path d="M6 13.6 A4.4 4.4 0 0 1 10.4 18"/><path d="M6 9.1 A8.9 8.9 0 0 1 14.9 18"/><path d="M6 4.6 A13.4 13.4 0 0 1 19.4 18"/></svg>
  <h1>Highlight Radar</h1>
  <p>Which Twitch channel do you want to watch?</p>
  <div class="row"><span class="at">#</span><input id="ch" placeholder="channel name" autocomplete="off" autofocus><button id="go">Watch</button></div>
  <div class="err" id="err"></div>
  <p class="hint">Reads live chat instantly — no login, no account needed.</p>
</div>
<script>
  var ch=document.getElementById("ch"), go=document.getElementById("go"), err=document.getElementById("err");
  function watch(){
    var v=ch.value.trim().replace(/^#/,"");
    if(!v){err.textContent="Type a channel name.";return;}
    go.disabled=true; err.textContent="Connecting to #"+v+"…";
    fetch("/channel",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({channel:v})})
      .then(function(r){return r.json();})
      .then(function(r){ if(r.ok){location.reload();} else {err.textContent="Try again."; go.disabled=false;} })
      .catch(function(e){err.textContent="Error: "+e; go.disabled=false;});
  }
  go.onclick=watch;
  ch.addEventListener("keydown",function(e){if(e.key==="Enter")watch();});
</script>
</body>
</html>
